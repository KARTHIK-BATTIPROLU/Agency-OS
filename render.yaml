# Render blueprint for the Agency OS backend (Express API).
# Deploy via Render Dashboard > New > Blueprint, or set these manually.
services:
  - type: web
    name: agency-os-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build:server
    startCommand: node dist/server.cjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_DB
        value: agency_os
      # Secrets — set these in the Render dashboard (do not commit values).
      # MongoDB is the only database: clients, packages, activities, activity
      # files, users, tasks, and invoices all live here.
      - key: MONGODB_URI
        sync: false
      # Firebase is used ONLY for login (email/password). Uploaded files live
      # in MongoDB GridFS, not Firebase Storage.
      - key: FIREBASE_AUTH_PROJECT_ID
        sync: false
      # Base64-encoded service account JSON for the agency-os-sla-72519 project —
      # required off-GCP so firebase-admin can authenticate Auth tokens.
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      # Comma-separated list of allowed browser origins for direct CORS calls,
      # e.g. https://your-site.netlify.app — never set to "*" in production.
      - key: FRONTEND_ORIGINS
        sync: false
